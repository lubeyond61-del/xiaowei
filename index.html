<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小薇原谅礼包</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .text-container {
            text-align: center;
            margin-bottom: 40px;
            animation: float 3s ease-in-out infinite;
        }

        .funny-text {
            font-size: 2.5rem;
            font-weight: bold;
            color: #e74c3c;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            margin: 10px 0;
            transform: rotate(-5deg);
            animation: shake 2s infinite;
        }

        .btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            background: linear-gradient(45deg, #4CAF50, #8BC34A);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: scale(1.1) rotate(2deg);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .success-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            animation: pop 0.5s;
        }

        .modal-text {
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 20px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes shake {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        @keyframes pop {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="text-container">
        <div class="funny-text">小薇，我错了~</div>
        <div class="funny-text" style="color: #9b59b6; transform: rotate(3deg);">真的知道错啦！</div>
        <div class="funny-text" style="color: #3498db; transform: rotate(-2deg);">原谅我嘛~</div>
    </div>

    <button class="btn" onclick="showSuccess()">原谅，领取礼包</button>

    <div class="success-modal" id="successModal">
        <div class="modal-content">
            <div class="modal-text">领取成功！</div>
            <div class="modal-text">请截图发送至客服</div>
        </div>
    </div>

    <script>
        function showSuccess() {
            document.getElementById('successModal').style.display = 'flex';
        }
    </script>
</body>
</html>
